name: Feature Request
description: Suggest an improvement for mineru-pdf
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## Feature Request"
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case — what are you trying to do that the skill can't currently help with?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like the skill to do differently?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?
